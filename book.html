<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDAMC | Secure Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --brand: #0ea5e9; --brand-hover: #0284c7; }
    body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
    .wrapper { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); ring: 2px solid rgba(14, 165, 233, 0.1); }
    
    /* Closed Status Style */
    .closed-overlay {
        position: absolute; inset: 0; background: rgba(255,255,255,0.9); 
        backdrop-filter: blur(4px); z-index: 50; display: flex; 
        flex-direction: column; align-items: center; justify-content: center;
        text-align: center; border-radius: 20px; padding: 20px;
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

<div class="wrapper w-full max-w-2xl overflow-hidden">
  <div id="closedMessage" class="closed-overlay hidden">
    <div class="bg-red-50 p-6 rounded-2xl border border-red-100">
        <span class="text-4xl mb-4 block">🚫</span>
        <h3 class="text-xl font-bold text-red-600">Clinic Currently Closed</h3>
        <p class="text-slate-600 mt-2 text-sm">We are not accepting new appointments at this moment. Please try again later.</p>
        <button onclick="location.reload()" class="mt-4 text-xs font-bold text-sky-600 uppercase tracking-widest">Refresh Page</button>
    </div>
  </div>

  <div class="p-8 text-center border-b border-slate-100">
    <h2 class="text-2xl font-bold text-slate-800">Book Appointment</h2>
    <p class="text-slate-500 text-sm">Fill in the details to secure your slot</p>
  </div>

  <form id="appointmentForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-5">
    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Full Name</label>
        <input type="text" id="name" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Email Address</label>
        <input type="email" id="email" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Phone Number</label>
        <input type="tel" id="phone" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Age</label>
        <input type="number" id="age" class="w-full p-3 border rounded-xl mt-1" required min="1">
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Gender</label>
        <select id="gender" class="w-full p-3 border rounded-xl mt-1" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Clinical Service</label>
        <select id="service" class="w-full p-3 border rounded-xl mt-1" required>
            <option value="">Choose Service</option>
            <option id="opt-medical" value="medical op">Medical OP</option>
            <option id="opt-dental" value="dental op">Dental OP</option>
        </select>
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Date</label>
        <input type="date" id="date" class="w-full p-3 border rounded-xl mt-1" required>
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Preferred Time</label>
        <input type="time" id="time" class="w-full p-3 border rounded-xl mt-1" required>
    </div>

    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Notes (Optional)</label>
        <textarea id="notes" class="w-full p-3 border rounded-xl mt-1 h-24" placeholder="Mention any specific symptoms..."></textarea>
    </div>

    <button type="submit" id="submitBtn" class="md:col-span-2 bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-100">
        Confirm Booking
    </button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",
  authDomain: "clinical-570e7.firebaseapp.com",
  projectId: "clinical-570e7",
  storageBucket: "clinical-570e7.firebasestorage.app",
  messagingSenderId: "521811871855",
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById('appointmentForm');
const btn = document.getElementById('submitBtn');
const medicalOpt = document.getElementById('opt-medical');
const dentalOpt = document.getElementById('opt-dental');
const closedMessage = document.getElementById('closedMessage');

document.getElementById('date').min = new Date().toISOString().split("T")[0];

// --- REAL-TIME CLINIC STATUS CHECK ---
let clinicStatus = { dental: true, medical: true };

onSnapshot(doc(db, "settings", "clinicStatus"), (snap) => {
    if (snap.exists()) {
        clinicStatus = snap.data();
        
        // Update Medical Option
        if (!clinicStatus.medical) {
            medicalOpt.innerText = "Medical OP (Temporarily Closed)";
            medicalOpt.disabled = true;
        } else {
            medicalOpt.innerText = "Medical OP";
            medicalOpt.disabled = false;
        }

        // Update Dental Option
        if (!clinicStatus.dental) {
            dentalOpt.innerText = "Dental OP (Temporarily Closed)";
            dentalOpt.disabled = true;
        } else {
            dentalOpt.innerText = "Dental OP";
            dentalOpt.disabled = false;
        }

        // If both are closed, show global message
        if (!clinicStatus.medical && !clinicStatus.dental) {
            closedMessage.classList.remove('hidden');
        } else {
            closedMessage.classList.add('hidden');
        }
    }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const time = document.getElementById('time').value;
  const date = document.getElementById('date').value;
  const service = document.getElementById('service').value;

  // Final Validation: Is the specific clinic closed?
  const isDental = service.includes("dental");
  if ((isDental && !clinicStatus.dental) || (!isDental && !clinicStatus.medical)) {
      alert("Sorry, this clinic just stopped taking appointments. Please refresh or try another service.");
      return;
  }

  // Working Hours Check
  const [hours, minutes] = time.split(':').map(Number);
  const totalMinutes = hours * 60 + minutes;
  const isWorking = (totalMinutes >= 600 && totalMinutes < 780) || (totalMinutes >= 840 && totalMinutes < 1020);

  if (!isWorking) {
    alert("Clinic Hours: 10:00 AM - 1:00 PM & 2:00 PM - 5:00 PM");
    return;
  }

  btn.innerText = "Checking Availability...";
  btn.disabled = true;

  try {
    const q = query(collection(db, "appointments"), where("date", "==", date), where("service", "==", service));
    const snapshot = await getDocs(q);
    let conflict = false;

    snapshot.forEach(doc => {
      const [exH, exM] = doc.data().time.split(':').map(Number);
      if (Math.abs((exH * 60 + exM) - totalMinutes) < 20) conflict = true;
    });

    if (conflict) {
      alert("This slot is taken. Please choose a time at least 20 mins apart.");
      btn.disabled = false;
      btn.innerText = "Confirm Booking";
      return;
    }

    const bookingId = Math.floor(1000 + Math.random() * 9000).toString();

    const appointmentData = {
      bookingId,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      age: document.getElementById('age').value,
      gender: document.getElementById('gender').value,
      service,
      date,
      time,
      notes: document.getElementById('notes').value,
      status: "pending",
      timestamp: new Date().toISOString()
    };

    await addDoc(collection(db, "appointments"), appointmentData);
    localStorage.setItem("lastBooking", JSON.stringify(appointmentData));
    window.location.href = "confirmation.html";

  } catch (err) {
    alert("Error: " + err.message);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
