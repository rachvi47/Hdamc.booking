<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDAMC | Secure Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --brand: #0ea5e9; --brand-hover: #0284c7; }
    body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
    .wrapper { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); ring: 2px solid rgba(14, 165, 233, 0.1); }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

<div class="wrapper w-full max-w-2xl overflow-hidden">
  <div class="p-8 text-center border-b border-slate-100">
    <h2 class="text-2xl font-bold text-slate-800">Book Appointment</h2>
    <p class="text-slate-500 text-sm">Fill in the details to secure your slot</p>
  </div>

  <form id="appointmentForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-5">
    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Full Name</label>
        <input type="text" id="name" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Email Address</label>
        <input type="email" id="email" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Phone Number</label>
        <input type="tel" id="phone" class="w-full p-3 border rounded-xl mt-1" required>
    </div>
    
    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Age</label>
        <input type="number" id="age" class="w-full p-3 border rounded-xl mt-1" required min="1">
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Gender</label>
        <select id="gender" class="w-full p-3 border rounded-xl mt-1" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Clinical Service</label>
        <select id="service" class="w-full p-3 border rounded-xl mt-1" required>
            <option value="">Choose Service</option>
            <option value="medical op">Medical OP</option>
            <option value="dental op">Dental OP</option>
        </select>
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Date</label>
        <input type="date" id="date" class="w-full p-3 border rounded-xl mt-1" required>
    </div>

    <div>
        <label class="text-xs font-bold text-slate-400 uppercase">Preferred Time</label>
        <input type="time" id="time" class="w-full p-3 border rounded-xl mt-1" required>
    </div>

    <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase">Notes (Optional)</label>
        <textarea id="notes" class="w-full p-3 border rounded-xl mt-1 h-24" placeholder="Mention any specific symptoms..."></textarea>
    </div>

    <button type="submit" id="submitBtn" class="md:col-span-2 bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-100">
        Confirm Booking
    </button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAnvpgtFnBRXYApmnnb4yoYQqHqcgnhsk",
  authDomain: "clinical-570e7.firebaseapp.com",
  projectId: "clinical-570e7",
  storageBucket: "clinical-570e7.appspot.com",
  messagingSenderId: "521811871855",
  appId: "1:521811871855:web:02ec35c3fd299db6e2659a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById('appointmentForm');
const btn = document.getElementById('submitBtn');

document.getElementById('date').min = new Date().toISOString().split("T")[0];

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const time = document.getElementById('time').value;
  const date = document.getElementById('date').value;
  const service = document.getElementById('service').value;

  // Working Hours Check
  const [hours, minutes] = time.split(':').map(Number);
  const totalMinutes = hours * 60 + minutes;
  const isWorking = (totalMinutes >= 600 && totalMinutes < 780) || (totalMinutes >= 840 && totalMinutes < 1020);

  if (!isWorking) {
    alert("Clinic Hours: 10:00 AM - 1:00 PM & 2:00 PM - 5:00 PM");
    return;
  }

  btn.innerText = "Checking Availability...";
  btn.disabled = true;

  try {
    const q = query(collection(db, "appointments"), where("date", "==", date), where("service", "==", service));
    const snapshot = await getDocs(q);
    let conflict = false;

    snapshot.forEach(doc => {
      const [exH, exM] = doc.data().time.split(':').map(Number);
      if (Math.abs((exH * 60 + exM) - totalMinutes) < 20) conflict = true;
    });

    if (conflict) {
      alert("This slot is taken. Please choose a time at least 20 mins apart.");
      btn.disabled = false;
      btn.innerText = "Confirm Booking";
      return;
    }

    // 🏆 GENERATE 4-DIGIT ID
    const bookingId = Math.floor(1000 + Math.random() * 9000).toString();

    const appointmentData = {
      bookingId,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      age: document.getElementById('age').value,
      gender: document.getElementById('gender').value,
      service,
      date,
      time,
      notes: document.getElementById('notes').value,
      status: "pending",
      timestamp: new Date().toISOString()
    };

    await addDoc(collection(db, "appointments"), appointmentData);
    localStorage.setItem("lastBooking", JSON.stringify(appointmentData));
    window.location.href = "confirmation.html";

  } catch (err) {
    alert("Error: " + err.message);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
