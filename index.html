<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDAMC | Personalized Healthcare</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --brand: #0284c7;
      --brand-soft: #f0f9ff;
      --dark: #1e293b;
      --slate: #475569;
      --white: #ffffff;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8fafc;
      color: var(--dark);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Clean Header */
    header {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 1.5rem 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo span { color: var(--brand); }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 10%;
      background: radial-gradient(circle at top right, #e0f2fe, transparent),
                  linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
    }

    .hero-content {
      max-width: 550px;
      animation: fadeIn 0.8s var(--ease);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mini-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 2.8rem);
      line-height: 1.2;
      margin-bottom: 1.2rem;
      color: #0f172a;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--slate);
      margin-bottom: 2.5rem;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-main {
      background: var(--brand);
      color: white;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s var(--ease);
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      box-shadow: 0 4px 14px 0 rgba(2, 132, 199, 0.2);
    }

    .btn-main:hover {
      background: #0369a1;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(2, 132, 199, 0.3);
    }

    .btn-outline {
      border: 1px solid #cbd5e1;
      background: white;
      color: var(--dark);
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
    }

    .btn-outline:hover {
      background: #f8fafc;
      border-color: var(--brand);
      color: var(--brand);
    }

    /* Features Grid */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin-top: 50px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--slate);
      font-weight: 500;
    }

    .feature-item span {
      color: var(--brand);
      font-weight: bold;
      background: var(--brand-soft);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .hero { text-align: center; justify-content: center; padding-top: 120px; }
      .btn-group { justify-content: center; }
      .features { justify-content: center; }
    }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">🏥 HDAMC<span>.</span></a>
  <button class="btn-outline" style="padding: 10px 20px; font-size: 0.85rem;" onclick="location.href='https://hdamc.vercel.app/#home'">About Us</button>
</header>

<section class="hero">
  <div class="hero-content">
    <span class="mini-badge">Trusted Clinic</span>
    <h1>Professional Care <br>You Can Trust.</h1>
    <p>Providing quality consultations and medical services in a comfortable, personal environment for your whole family.</p>
    
    <div class="btn-group">
      <button class="btn-main" onclick="gotoBooking()">Book Appointment</button>
      <button class="btn-outline" onclick="location.href='ser.html'">Our Services</button>
    </div>

    <div class="features">
      <div class="feature-item"><span>✓</span> Expert Doctors</div>
      <div class="feature-item"><span>✓</span> Quick Checkups</div>
      <div class="feature-item"><span>✓</span> Family Friendly</div>
    </div>
  </div>
</section>

<script>
  // Redirects to your booking form
  function gotoBooking() {
    const btn = event.target;
    btn.innerText = "Loading...";
    btn.style.opacity = "0.8";
    
    setTimeout(() => {
      window.location.href = "book.html"; 
    }, 400);
  }

  // If you wanted the About Us button to do something else
  function showAbout() {
    alert("HDAMC: Quality healthcare since 2020.");
  }
</script>

</body>
</html>
